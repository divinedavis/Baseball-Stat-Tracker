name: BaseballStatTracker
options:
  bundleIdPrefix: com.divinedavis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "CG89RY4W6R"
targets:
  BaseballStatTracker:
    type: application
    platform: iOS
    sources:
      - path: BaseballStatTracker
    info:
      path: BaseballStatTracker/Info.plist
      properties:
        CFBundleDisplayName: BARREL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconFiles:
              - AppIcon
            UIPrerenderedIcon: false
          CFBundleAlternateIcons:
            BarrelNight:
              CFBundleIconFiles:
                - BarrelNight
              UIPrerenderedIcon: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.divinedavis.BaseballStatTracker
        CODE_SIGN_ENTITLEMENTS: BaseballStatTracker/BaseballStatTracker.entitlements
        CURRENT_PROJECT_VERSION: "37"
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
